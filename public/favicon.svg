<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- blueprint dark panel -->
  <rect width="32" height="32" rx="7" fill="#0f1419"/>
  <!-- faint blueprint grid -->
  <g stroke="#56849a" stroke-opacity="0.16" stroke-width="1">
    <path d="M10.5 2 V30 M21.5 2 V30 M2 10.5 H30 M2 21.5 H30"/>
  </g>
  <!-- station marker: cyan dot in a squared ring (the brand mark) -->
  <rect x="9" y="9" width="14" height="14" rx="3.5" fill="none" stroke="#2dd4d4" stroke-width="1.6"/>
  <circle cx="16" cy="16" r="3.6" fill="#2dd4d4"/>
</svg>
